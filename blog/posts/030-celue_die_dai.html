            <h2>关于量化策略的持续迭代</h2>
            
            
            <p>量化策略的有效性总是随时间衰减。今天回顾了过去几个策略的表现，发现一个规律：</p>
            
            <p>任何策略在公开或被多人使用后，超额收益都会逐渐收窄。这不仅仅是市场有效性的体现，更是因为市场参与者的学习效应。</p>
            
            <div class="highlight">
                <strong>思考：</strong>策略开发不应该追求"圣杯"，而应该建立一个持续发现、验证、迭代的体系。
            </div>
            
            <p>接下来需要建立一个策略监控框架，及时发现策略失效的信号。</p>

            <h2>市场波动与情绪指标</h2>
            
            
            <p>今天观察到一个有趣的现象：当VIX（波动率指数）处于低位时，趋势跟踪策略的胜率明显下降。</p>
            
            <p>这可能是因为低波动环境下，市场缺乏明确方向，均线交叉信号更容易产生假突破。</p>
            
            <div class="highlight">
                <strong>假设：</strong>波动率可以作为趋势策略的过滤器。在ATR低于20日均值时，减少仓位或暂停交易。
            </div>
            
            <p>需要用历史数据验证这个假设的有效性。</p>

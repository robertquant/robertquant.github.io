            <p>小市值因子在A股市场长期有效，但近年来波动加大。今天回测了2015-2024年的数据，验证其有效性。</p>
            
            <p>关键发现：小市值因子在牛市中表现优异，但在熊市中回撤巨大，需要配合止损机制。</p>

            </div>

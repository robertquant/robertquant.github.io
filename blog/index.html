<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化随笔 | Robert Quant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.8;
            color: #333;
            background: #f5f7fa;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            border-radius: 16px;
            margin-bottom: 40px;
            text-align: center;
        }
        header h1 { font-size: 2.2em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            font-size: 0.9em;
        }
        .stats span {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }
        
        .post-list { display: grid; gap: 20px; }
        .post-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .post-card a { text-decoration: none; color: inherit; }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .post-title {
            font-size: 1.3em;
            color: #2d3748;
            font-weight: 600;
            flex: 1;
        }
        .post-date { 
            color: #a0aec0; 
            font-size: 0.9em;
            white-space: nowrap;
        }
        .post-meta { margin-bottom: 10px; }
        .tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-right: 8px;
        }
        .post-excerpt {
            color: #718096;
            font-size: 0.95em;
            line-height: 1.6;
        }
        
        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 40px;
            padding: 20px;
        }
        .pagination button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.2s;
        }
        .pagination button:hover:not(:disabled) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination .page-info {
            padding: 10px 20px;
            background: white;
            border-radius: 8px;
            color: #4a5568;
            font-size: 0.9em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .pagination .page-numbers {
            display: flex;
            gap: 5px;
        }
        .pagination .page-numbers button {
            min-width: 40px;
            padding: 10px;
        }
        .pagination .page-numbers button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .nav {
            margin-top: 40px;
            text-align: center;
        }
        .nav a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
        }
        
        .category-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .category-nav a {
            padding: 8px 20px;
            background: white;
            border-radius: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
        }
        .category-nav a:hover, .category-nav a.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>

            <div class="stats">
                <span id="total-posts">共 0 篇文章</span>
                <span id="total-pages">共 0 页</span>

        <nav class="category-nav">
            <a href="#" class="active" onclick="filterPosts('all', this)">全部</a>
            <a href="#" onclick="filterPosts('策略研究', this)">策略研究</a>

            <a href="#" onclick="filterPosts('市场观察', this)">市场观察</a>

        <div class="post-list" id="post-list">
            <!-- 文章列表将由JavaScript动态生成 -->
        </div>

        <div class="pagination" id="pagination">
            <!-- 分页导航将由JavaScript动态生成 -->
        </div>

        <nav class="nav">
            <a href="../index.html">← 返回首页</a>

    </div>

    <script>

        const posts = [

            { id: 39, title: '当止损失效时：ETF轮动研究的四个反直觉发现', date: '2026-04-28', category: '策略研究', file: '039-when-stop-loss-fails.html', excerpt: '-8%硬止损完全无效、60日过滤击败20日、参数平原揭示过拟合免疫、回撤78%来自系统性风险...' },
            { id: 38, title: 'ETF轮动策略V3研究报告：从8%到25%的优化之路', date: '2026-03-26', category: '策略研究', file: '038-etf-rotation-v3-report.html', excerpt: '通过三阶段优化，将ETF轮动策略年化收益从8.14%提升至25.67%的完整研究报告...' },
            { id: 37, title: '量化交易系统设计', date: '2026-03-26', category: '技术实现', file: '037-jiaoyi_xitong.html', excerpt: '从想法到实盘的完整系统架构设计...' },
            { id: 35, title: '趋势跟踪策略优化', date: '2026-03-26', category: '策略研究', file: '035-qushi_genzong.html', excerpt: '双均线策略参数扫描与最优组合选择...' },
            { id: 30, title: '市场波动与情绪指标', date: '2026-03-25', category: '市场观察', file: '030-shichang_bodong.html', excerpt: '基于ATR的波动率过滤器构建与回测验证...' },
            { id: 29, title: '风险控制与仓位管理', date: '2026-03-25', category: '策略研究', file: '029-fengxian_kongzhi.html', excerpt: '量化投资中的三层风控体系与Kelly公式应用...' },
            { id: 28, title: 'A股散户行为与量化机会', date: '2026-03-25', category: '市场观察', file: '028-sanhu_xingwei.html', excerpt: '散户情绪指标构建与量化套利机会识别...' },
            { id: 27, title: '关于量化策略的持续迭代', date: '2026-03-25', category: '策略研究', file: '027-celue_die_dai.html', excerpt: '策略生命周期管理与持续优化方法论...' },
            { id: 24, title: '小市值因子初探', date: '2026-03-25', category: '策略研究', file: '024-xiaoshizhi_yinzi.html', excerpt: '小市值因子在A股市场的历史表现与有效性检验...' },
            { id: 13, title: '腾讯财经：被忽视的免费量化数据源', date: '2026-03-24', category: '技术实现', file: '013-tencent-finance.html', excerpt: '腾讯财经API的数据覆盖范围与使用技巧...' },
            { id: 12, title: 'AKShare：Python开源金融数据接口库深度调研', date: '2026-03-24', category: '技术实现', file: '012-akshare-deep-dive.html', excerpt: '免费开源的Python金融数据获取工具全面评测...' },
            { id: 10, title: '布林带突破+量价配合', date: '2026-03-23', category: '策略研究', file: '010-strategy-布林带突破_量价配合.html', excerpt: '技术分析策略的回测验证与参数优化...' },
            { id: 9, title: '国内量化投资大V全景图谱', date: '2026-03-23', category: '市场观察', file: '009-chinese-quant-experts.html', excerpt: '雪球、知乎等平台的量化投资意见领袖整理...' },
            { id: 8, title: 'python_jointquant 策略库深度解析', date: '2026-03-23', category: '技术实现', file: '008-python-jointquant-analysis.html', excerpt: '聚宽Python策略库的量化投资应用与实践...' },
            { id: 7, title: 'vn.py：中国量化交易领域的"国产之光"', date: '2026-03-23', category: '技术实现', file: '007-vnpy-deep-dive.html', excerpt: '国产量化框架vn.py的架构设计与实盘交易能力分析...' },
            { id: 6, title: '2025年GitHub主流量化框架全景', date: '2026-03-23', category: '技术实现', file: '006-framework-landscape.html', excerpt: '国内外主流量化回测框架的全面对比与选型建议...' },
            { id: 5, title: 'GitHub量化代码库调研：量化交易回测', date: '2026-03-23', category: '技术实现', file: '005-github-research.html', excerpt: 'GitHub上热门的量化交易开源项目分析与对比...' },
            { id: 4, title: 'Backtrader：Python量化回测框架深度调研', date: '2026-03-23', category: '技术实现', file: '004-backtrader-research.html', excerpt: '开源回测框架Backtrader的功能特性与代码结构分析...' },
            { id: 3, title: 'ETF轮动策略实践与优化', date: '2026-03-23', category: '策略研究', file: '003-etf-rotation.html', excerpt: '基于动量的ETF轮动策略回测与参数优化探索...' },
            { id: 2, title: '关于量化策略的持续迭代', date: '2026-03-23', category: '策略研究', file: '002-auto-generated.html', excerpt: '策略有效性随时间衰减的规律，以及如何建立持续迭代的机制...' },
            { id: 1, title: '趋势跟踪策略的再思考', date: '2026-03-23', category: '策略研究', file: '001-trend-following.html', excerpt: '从海龟交易法则到现代趋势跟踪，探讨趋势策略的演化与优化...' }
        ];

        // 分页配置
        const POSTS_PER_PAGE = 10;
        let currentPage = 1;
        let currentCategory = 'all';
        let filteredPosts = [...posts];

        // 过滤文章
        function filterPosts(category, element) {
            currentCategory = category;
            currentPage = 1;
            
            // 更新导航样式
            document.querySelectorAll('.category-nav a').forEach(a => a.classList.remove('active'));
            element.classList.add('active');
            
            // 过滤文章
            if (category === 'all') {
                filteredPosts = [...posts];
            } else {
                filteredPosts = posts.filter(post => post.category === category);
            }
            
            renderPosts();
            renderPagination();
            updateStats();
        }

        // 渲染文章列表
        function renderPosts() {
            const postList = document.getElementById('post-list');
            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const end = start + POSTS_PER_PAGE;
            const postsToShow = filteredPosts.slice(start, end);
            
            postList.innerHTML = postsToShow.map(post => `
                <div class="post-card">
                    <a href="./posts/${post.file}">
                        <div class="post-header">
                            <h3 class="post-title">${post.title}</h3>
                            <span class="post-date">${post.date}</span>
                        </div>
                        <div class="post-meta">
                            <span class="tag">${post.category}</span>
                        </div>
                        <p class="post-excerpt">${post.excerpt}</p>
                    </a>
                </div>
            `).join('');
        }

        // 渲染分页导航
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredPosts.length / POSTS_PER_PAGE);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = `
                <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
                <div class="page-info">第 ${currentPage} / ${totalPages} 页</div>
                <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
            `;
            
            pagination.innerHTML = html;
        }

        // 跳转到指定页
        function goToPage(page) {
            const totalPages = Math.ceil(filteredPosts.length / POSTS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            renderPosts();
            renderPagination();
            
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 更新统计信息
        function updateStats() {
            const totalPages = Math.ceil(filteredPosts.length / POSTS_PER_PAGE);
            document.getElementById('total-posts').textContent = `共 ${filteredPosts.length} 篇文章`;
            document.getElementById('total-pages').textContent = `共 ${totalPages} 页`;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderPosts();
            renderPagination();
            updateStats();
        });
    </script>
</body>
</html>

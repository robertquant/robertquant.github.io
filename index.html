<!DOCTYPE html>

            color: #333;

        }
        
        .container {

        .card {

        }
        
        .header {

        .avatar img {

        }

        .subtitle {

            margin: 20px 0;
        }
        
        .links {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .link-btn {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #a0aec0;
            font-size: 0.9em;
        }
        
        @media (max-width: 600px) {
